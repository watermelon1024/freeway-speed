perception:
  vehicle_backend: yolo
  lane_backend: onnx
  yolo_model: yolov8n.pt
  yolo_classes: [car, bus, truck]
  yolo_conf: 0.10
  yolo_iou: 0.45
  yolo_imgsz: 640
  vehicle_upscale_factor: 2.0
  lane_temporal_smoothing: true
  lane_temporal_alpha: 0.05
  lane_onnx: ../yolop-640-640.onnx

ipm:
  roi_ratio_from_bottom: 0.30
  ema_alpha: 0.20
  bev_width: 640
  bev_height: 720

curve:
  min_points: 20
  bins: 40

calibration:
  dash_length_m: 4.0
  min_dash_pixels: 20
  max_dash_pixels: 180
  min_gap_pixels: 8
  min_dash_runs: 2
  search_band_px: 10
  lane_width_m: 3.5
  lane_hist_roi_start_ratio: 0.55
  lane_width_min_px: 70
  lane_width_max_px: 620
  lane_peak_min_votes: 8
  lane_peak_window_px: 8
  scale_ema_alpha: 0.35
  min_scale_m_per_px: 0.01
  max_scale_m_per_px: 0.08
  default_scale_m_per_px: 0.025

tracking:
  tracker_backend: bytetrack
  bt_track_high_thresh: 0.15
  bt_track_low_thresh: 0.05
  bt_new_track_thresh: 0.2
  bt_track_buffer: 60
  bt_match_thresh: 0.9
  bt_fuse_score: true
  min_dt_sec: 0.4
  speed_smooth_window: 5
  max_speed_kmh: 180.0

runtime:
  lane_update_every_n_frames: 30

traffic:
  direction_lookback_sec: 0.5
  direction_min_displacement_px: 10.0
  calibration_warmup_sec: 20.0
  calibration_min_samples: 80
  lane_hist_bins: 50
  lane_peak_prominence: 10.0
  lane_match_max_distance_px: 40.0
  lane_match_spacing_ratio: 0.85
  lane_match_span_ratio: 0.20
  flow_window_sec: 45.0
  flow_sample_interval_sec: 1.0
  dynamic_recalibration_interval_sec: 300.0
  dynamic_recalibration_lookback_sec: 60.0
